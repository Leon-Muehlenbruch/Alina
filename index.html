<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="Kay (__archon) Muehlenbruch">
  <meta name="copyright" content="© 2025 Kay (__archon) Muehlenbruch. MIT License.">
  <meta name="version" content="2.0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#B38463">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Alina">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Alina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>
  <style>
    #splash{animation:splashOut .5s ease-out 3s forwards}
    @keyframes splashOut{to{opacity:0;pointer-events:none;visibility:hidden}}
  </style>
  <div id="splash" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0e0e0f;transition:opacity .4s ease">
    <svg width="170" height="170" viewBox="30 25 480 480" xmlns="http://www.w3.org/2000/svg">
      <style>
        .sp-bubble{stroke-dasharray:1100;stroke-dashoffset:1100;animation:drawBubble 1.2s ease-out forwards}
        .sp-eyes{opacity:0;animation:fadeIn .4s ease-out .9s forwards}
        .sp-arc1{stroke-dasharray:80;stroke-dashoffset:80;animation:drawArc .5s ease-out 1.1s forwards}
        .sp-arc2{stroke-dasharray:120;stroke-dashoffset:120;animation:drawArc .5s ease-out 1.3s forwards}
        @keyframes drawBubble{to{stroke-dashoffset:0}}
        @keyframes fadeIn{to{opacity:1}}
        @keyframes drawArc{to{stroke-dashoffset:0}}
      </style>
      <path class="sp-bubble" d="M230 90 C130 90,55 165,55 260 C55 310,75 350,105 380 L75 440 L145 400 C170 415,198 420,230 420 C350 420,405 345,405 260 C405 165,330 90,230 90Z" fill="none" stroke="#B38463" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <g class="sp-eyes">
        <circle cx="185" cy="265" r="18" fill="#B38463"/>
        <circle cx="285" cy="265" r="18" fill="#B38463"/>
      </g>
      <path class="sp-arc1" d="M420 140 A55 55 0 0 1 450 195" fill="none" stroke="#B38463" stroke-width="12" stroke-linecap="round"/>
      <path class="sp-arc2" d="M440 100 A95 95 0 0 1 490 180" fill="none" stroke="#B38463" stroke-width="12" stroke-linecap="round"/>
    </svg>
    <div style="opacity:0;animation:fadeIn .6s ease-out 1.5s forwards;margin-top:1.2rem;font-family:sans-serif;font-size:2rem;font-weight:300;color:#B38463;letter-spacing:.08em">alina</div>
    <style>@keyframes fadeIn{to{opacity:1}}</style>
  </div>
  <div id="root"></div>
  <pwa-install
    manifest-url="/manifest.webmanifest"
    use-local-storage
    manual-apple
    manual-chrome
  ></pwa-install>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
