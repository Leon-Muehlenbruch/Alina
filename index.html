<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="Kay (__archon) Muehlenbruch">
  <meta name="copyright" content="© 2025 Kay (__archon) Muehlenbruch. MIT License.">
  <meta name="version" content="2.0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#B38463">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Alina">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Alina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>
  <div id="splash" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#0e0e0f;transition:opacity .4s ease">
    <svg width="160" height="160" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <style>
        .splash-ring{stroke-dasharray:630;stroke-dashoffset:630;animation:drawRing 1.2s ease-out forwards}
        .splash-dots{opacity:0;animation:fadeIn .5s ease-out 1s forwards}
        .splash-text{opacity:0;transform:translateY(10px);animation:textUp .8s ease-out 1.2s forwards}
        @keyframes drawRing{to{stroke-dashoffset:0}}
        @keyframes fadeIn{to{opacity:1}}
        @keyframes textUp{to{opacity:1;transform:translateY(0)}}
      </style>
      <path class="splash-ring" d="M200 80 A100 100 0 1 1 170 275 L145 300 L150 265 A100 100 0 0 1 200 80" fill="none" stroke="#B38463" stroke-width="4" stroke-linecap="round"/>
      <g class="splash-dots">
        <circle cx="170" cy="180" r="7" fill="#B38463"/>
        <circle cx="230" cy="180" r="7" fill="#B38463"/>
        <circle cx="285" cy="130" r="7" fill="#B38463"/>
      </g>
      <text class="splash-text" x="200" y="360" text-anchor="middle" font-family="sans-serif" font-size="60" font-weight="300" fill="#B38463">alina</text>
    </svg>
  </div>
  <div id="root"></div>
  <pwa-install
    manifest-url="/manifest.webmanifest"
    use-local-storage
    manual-apple
    manual-chrome
  ></pwa-install>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
